<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Получить ключ</title>
<style>
  :root{
    --bg-top: #0b0710;
    --bg-bottom: #1c1029;
    --violet: #9b6bff;
    --violet-soft: #7c4dff;
    --violet-dim: rgba(155,107,255,0.14);
    --card-bg: rgba(255,255,255,0.035);
    --card-border: rgba(167,139,250,0.16);
    --text-main: #eee9f7;
    --text-gray: #8a8397;
    --mono: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, Consolas, monospace;
    --sans: 'Manrope', -apple-system, 'Segoe UI', Roboto, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body{
    font-family: var(--sans);
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124,77,255,0.16), transparent 60%),
      linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before{
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(600px 400px at 15% 20%, rgba(124,77,255,0.05), transparent 70%),
      radial-gradient(500px 350px at 85% 80%, rgba(80,40,150,0.08), transparent 70%);
    pointer-events: none;
  }

  .card{
    position: relative;
    width: 100%;
    max-width: 360px;
    margin: 24px;
    padding: 40px 32px 32px;
    border-radius: 20px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow:
      0 20px 60px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    animation: rise 0.6s ease both;
  }

  @keyframes rise{
    from{ opacity: 0; transform: translateY(14px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  /* Заголовок-картинка: стилизованный знак ключа/кристалла (замените на свой <img>) */
  .logo-mark{
    width: 56px;
    height: 56px;
    margin-bottom: 18px;
    filter: drop-shadow(0 0 18px rgba(155,107,255,0.45));
  }

  .title{
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: var(--text-main);
    margin: 0 0 0px;
  }

  .title span{
    color: var(--violet);
  }

  .subtitle{
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--violet);
    opacity: 0.65;
    margin: 0 0 6px;
  }

  .description{
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--text-gray);
    margin: 0 0 28px;
    max-width: 280px;
    letter-spacing: 0.01em;
  }

  .btn {
    position: relative; /* Важно для позиционирования эффекта */
    overflow: hidden;   /* Чтобы подсветка не вылезала за скругление */
    width: 100%;
    padding: 11px 20px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--violet-soft), #5b21b6);
    color: #fff;
    font-family: var(--sans);
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    
    /* Убираем filter, оставляем только нужные анимации */
    transition: transform 0.15s ease, box-shadow 0.25s ease;
    box-shadow: 0 8px 24px rgba(124,77,255,0.28);
    transform: translateY(0);
  } 

  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #fff;
    opacity: 0;
    transition: opacity 0.2s ease; /* Плавный unhover для яркости */
    pointer-events: none;
  }

  .btn:hover{
    transform: translateY(-2px);
    filter: brightness(1.08);
    box-shadow: 0 12px 32px rgba(124,77,255,0.4);
    transition: transform 0.15s ease, box-shadow 0.25s ease, filter 0.2s ease;
  }

  .btn:active{
    transform: translateY(1);
    transition: transform 0.15s ease, box-shadow 0.25s ease, filter 0.2s ease;
  }

  .btn:focus-visible{
    outline: 2px solid var(--violet);
    outline-offset: 3px;
    transition: transform 0.15s ease, box-shadow 0.25s ease, filter 0.2s ease;
  }

  .btn svg{ 
    width: 14px;
    height: 14px;
    transition: transform 1s ease; 
  }

  .btn:hover svg{
    transform: translateX(3px);
    transition: transform 0.15s ease, box-shadow 0.25s ease, filter 0.2s ease;
  }

  @media (prefers-reduced-motion: reduce){
    .card{ animation: none; }
    .btn, .btn svg{ transition: none; }
  }
</style>
</head>
<body>

  <div class="card">
    <svg class="logo-mark" viewBox="0 0 56 56" fill="none" xmlns="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSSbpWvhWFkvAXq_qpPowisVthCQ9hlnMPrjDfa14zsVA&s=10">
      <rect x="1" y="1" width="54" height="54" rx="16" fill="url(#g1)" fill-opacity="0.15" stroke="url(#g1)" stroke-opacity="0.5"/>
      <path d="M20 18V38M20 28H31M31 18C34.866 18 38 21.134 38 25V31C38 34.866 34.866 38 31 38H20" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="31" cy="28" r="1.6" fill="url(#g1)"/>
      <defs>
        <linearGradient id="g1" x1="19" y1="15" x2="37" y2="37" gradientUnits="userSpaceOnUse">
          <stop stop-color="#c4a3ff"/>
          <stop offset="1" stop-color="#7c4dff"/>
        </linearGradient>
      </defs>
    </svg>

    <h1 class="title">GENX<span>.ON</span></h1>

    <p class="subtitle">by render</p>

    <p class="description">
      Топовый бесплатный серверсайд
    </p>

    <a class="btn" href="https://go.linkify.ru/2J69" target="_blank" rel="noopener noreferrer">
      Получить ключ
      <svg viewBox="0 0 16 16" fill="none">
        <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>

</body>
</html>
